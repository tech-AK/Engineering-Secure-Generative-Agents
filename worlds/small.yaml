      "Amon is a student at the Technical University Berlin (TU Berlin). He is interested in technical topics around machine learning and IT security. That is why he takes part in the course 'xxx' as well as 'Security Playground for Generative Agents' where he works together with Arthur  to investigate how sensitive the current machine learning models react to malicious attacks in a sandbox world.
